name: CI

on:
  push:
  pull_request:
  schedule:
    # Weekly supply-chain check even when there are no pushes
    - cron: "0 14 * * 1"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit (supply chain)
        run: pnpm audit --audit-level high

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # Match GitHub Pages project-site path so CI catches base-path issues
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Verify security meta in production HTML
        run: |
          grep -q 'http-equiv="Content-Security-Policy"' dist/index.html
          grep -q 'name="referrer"' dist/index.html
          grep -q 'http-equiv="Permissions-Policy"' dist/index.html
